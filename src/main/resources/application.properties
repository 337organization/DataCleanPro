# Database configuration
db.url=jdbc:mysql://localhost:3306/datacleanpro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
db.username=root
db.password=root
db.driver=com.mysql.cj.jdbc.Driver

# Connection pool configuration
db.pool.size=5
db.pool.timeout=5000

# Application configuration
app.name=DataCleanPro
app.version=1.0.0
app.storage.uploads=storage/uploads/
app.storage.reports=storage/reports/
app.storage.logs=storage/logs/
app.storage.errors=storage/errors/

# File processing configuration
file.max.size=104857600
file.allowed.types=xlsx,xls,csv

# Network configuration
server.port=8888
server.host=localhost
client.timeout=30000

# Thread pool configuration
thread.pool.size=4
thread.pool.max.size=8

# Logging configuration
logging.level.root=INFO
logging.level.com.datacleanpro=DEBUG
